{% set name = "pint-xarray" %}
{% set version = "0.6.1" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: a0febf909b69342fde39b8e053875c52bb75a65e4fc56d95bd146f74449aed84

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=77
    - setuptools_scm >=8
  run:
    - numpy >=1.26
    - pint >=0.24
    - python >={{ python_min }}
    - xarray >=2023.07.0

test:
  imports:
    - pint_xarray
    - pint_xarray.tests
  commands:
    - pip check
    - python -c 'from pint_xarray import __version__; assert __version__ != "0.0.0"'
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/xarray-contrib/pint-xarray
  summary: Physical units interface to xarray using Pint
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - keewis
    - jthielen
